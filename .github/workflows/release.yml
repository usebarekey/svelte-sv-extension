name: release

on:
    push:
        branches:
            - master
        tags:
            - "v*"
        paths:
            - package.json
            - .github/workflows/release.yml
    workflow_dispatch:

permissions:
    contents: write
    id-token: write

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    detect_release:
        runs-on: ubuntu-latest

        outputs:
            package_name: ${{ steps.resolve.outputs.package_name }}
            release_version: ${{ steps.resolve.outputs.release_version }}
            should_release: ${{ steps.detect.outputs.should_release }}
            tag_name: ${{ steps.resolve.outputs.tag_name }}

        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: setup_node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: enable_corepack
              run: corepack enable

            - name: resolve_package
              id: resolve
              shell: bash
              run: |
                  PACKAGE_NAME="$(node -p "require('./package.json').name")"
                  VERSION="$(node -p "require('./package.json').version")"
                  TAG="v$VERSION"

                  echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
                  echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

            - name: detect_release
              id: detect
              shell: bash
              run: |
                  PACKAGE_NAME="${{ steps.resolve.outputs.package_name }}"
                  VERSION="${{ steps.resolve.outputs.release_version }}"

                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "should_release=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "${{ github.ref }}" = "refs/tags/${{ steps.resolve.outputs.tag_name }}" ]; then
                    echo "should_release=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "${{ github.ref }}" != "refs/heads/master" ]; then
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  BEFORE="${{ github.event.before }}"
                  if [ -n "$BEFORE" ] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
                    if git diff --unified=0 "$BEFORE" "${{ github.sha }}" -- package.json |
                      grep -Eq '^[+-][[:space:]]*"version":[[:space:]]*"'
                    then
                      echo "should_release=true" >> "$GITHUB_OUTPUT"
                      exit 0
                    fi
                  fi

                  if corepack pnpm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "should_release=true" >> "$GITHUB_OUTPUT"
                  fi

    release:
        needs: detect_release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/master' && needs.detect_release.outputs.should_release == 'true')
        runs-on: ubuntu-latest

        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: setup_node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org

            - name: enable_corepack
              run: corepack enable

            - name: upgrade_npm
              shell: bash
              run: |
                  cd "$RUNNER_TEMP"
                  npm install -g npm@^11.15.0

            - name: install_vite_plus
              shell: bash
              run: |
                  curl -fsSL https://vite.plus | bash
                  echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

            - name: install_dependencies
              run: corepack pnpm install --frozen-lockfile

            - name: resolve_release_meta
              id: release_meta
              shell: bash
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                    TAG="${{ github.ref_name }}"
                    VERSION="${TAG#v}"
                  else
                    VERSION="${{ needs.detect_release.outputs.release_version }}"
                    TAG="${{ needs.detect_release.outputs.tag_name }}"
                  fi

                  PACKAGE_NAME="$(node -p "require('./package.json').name")"

                  echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
                  echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
                  echo "TAG_NAME=$TAG" >> "$GITHUB_ENV"
                  echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
                  echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

            - name: validate_release_version
              shell: bash
              run: |
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
                    echo "Package version $PACKAGE_VERSION does not match release version $RELEASE_VERSION." >&2
                    exit 1
                  fi

            - name: ensure_tag_exists
              if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
              shell: bash
              run: |
                  git fetch --tags

                  if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag $TAG_NAME already exists."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "$TAG_NAME" "${GITHUB_SHA}"
                  git push origin "$TAG_NAME"

            - name: lint
              run: corepack pnpm run lint

            - name: check
              run: corepack pnpm run check

            - name: test
              run: corepack pnpm run test

            - name: build
              run: corepack pnpm run build

            - name: publish_to_npm
              shell: bash
              run: |
                  if corepack pnpm view "$PACKAGE_NAME@$RELEASE_VERSION" version >/dev/null 2>&1; then
                    echo "$PACKAGE_NAME@$RELEASE_VERSION is already published. Skipping npm publish."
                    exit 0
                  fi

                  PACK_DIR="$(mktemp -d)"
                  corepack pnpm pack --pack-destination "$PACK_DIR"

                  PACKAGE_TGZ="$(find "$PACK_DIR" -maxdepth 1 -name '*.tgz' -print -quit)"
                  if [ -z "$PACKAGE_TGZ" ]; then
                    echo "No package tarball was created in $PACK_DIR." >&2
                    exit 1
                  fi

                  npm --force publish "$PACKAGE_TGZ" --access public --provenance

            - name: create_or_update_release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  REPO_URL="${{ github.server_url }}/${{ github.repository }}"
                  PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -Fvx "$TAG_NAME" | head -n 1)"
                  NOTES_FILE="$(mktemp)"

                  {
                    echo "## $TAG_NAME"
                    echo
                    if [ -n "$PREVIOUS_TAG" ]; then
                      echo "Changes since [$PREVIOUS_TAG]($REPO_URL/releases/tag/$PREVIOUS_TAG)."
                      echo
                      echo "[Full diff]($REPO_URL/compare/$PREVIOUS_TAG...$TAG_NAME)"
                    else
                      echo "Initial release."
                    fi
                    echo
                    echo "Published npm package: \`$PACKAGE_NAME@$RELEASE_VERSION\`."
                    echo
                    echo "### Commits"

                    if [ -n "$PREVIOUS_TAG" ]; then
                      RANGE="$PREVIOUS_TAG..${GITHUB_SHA}"
                    else
                      RANGE="${GITHUB_SHA}"
                    fi

                    git log --reverse --format='%H%x09%s' "$RANGE" | while IFS=$'\t' read -r commit_sha subject; do
                      short_sha="${commit_sha:0:7}"
                      echo "- [$short_sha]($REPO_URL/commit/$commit_sha) $subject"
                    done
                  } > "$NOTES_FILE"

                  if gh release view "$TAG_NAME" >/dev/null 2>&1; then
                    gh release edit "$TAG_NAME" \
                      --title "$TAG_NAME" \
                      --notes-file "$NOTES_FILE"
                  else
                    gh release create "$TAG_NAME" \
                      --title "$TAG_NAME" \
                      --notes-file "$NOTES_FILE"
                  fi
